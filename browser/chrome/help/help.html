<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snaproo Help</title>
  <link rel="stylesheet" href="../styles/shared.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { min-height: 100vh; display: flex; background: var(--slate-950); color: var(--slate-200); margin: 0; }
    .help-nav { width: 220px; flex-shrink: 0; border-right: 1px solid var(--slate-800); padding: 1.5rem 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .help-nav-title { padding: 0 1.25rem; font-size: 1rem; font-weight: 700; color: var(--saffron-400); margin-bottom: 1rem; }
    .help-nav-item { display: block; padding: 0.5rem 1.25rem; font-size: 0.8125rem; color: var(--slate-400); text-decoration: none; border-left: 3px solid transparent; transition: all 0.12s; cursor: pointer; }
    .help-nav-item:hover { color: var(--slate-200); background: var(--slate-900); }
    .help-nav-item.active { color: var(--saffron-400); border-left-color: var(--saffron-400); background: rgba(244,196,48,0.03); }
    .help-content { flex: 1; padding: 2rem 3rem; max-width: 750px; overflow-y: auto; }
    .help-content h1 { font-size: 1.5rem; font-weight: 700; color: var(--slate-100); margin: 0 0 0.5rem; }
    .help-content h2 { font-size: 1.125rem; font-weight: 600; color: var(--saffron-400); margin: 2rem 0 0.75rem; padding-top: 1.5rem; border-top: 1px solid var(--slate-800); }
    .help-content h3 { font-size: 0.9375rem; font-weight: 600; color: var(--slate-200); margin: 1.25rem 0 0.5rem; }
    .help-content p { font-size: 0.875rem; color: var(--slate-400); line-height: 1.7; margin: 0 0 0.75rem; }
    .help-content ul, .help-content ol { margin: 0 0 1rem; padding-left: 1.25rem; }
    .help-content li { font-size: 0.875rem; color: var(--slate-400); line-height: 1.7; margin-bottom: 0.25rem; }
    .help-content code { background: var(--slate-800); padding: 1px 5px; border-radius: 3px; font-size: 0.8125rem; color: var(--slate-200); }
    .help-content kbd { background: var(--slate-800); border: 1px solid var(--slate-700); padding: 1px 6px; border-radius: 4px; font-size: 0.75rem; font-family: monospace; color: var(--slate-200); }
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 0.75rem 0; }
    .fi { background: var(--slate-900); border: 1px solid var(--slate-800); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.8125rem; color: var(--slate-300); }
    .fi strong { color: var(--saffron-400); }
    .st { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
    .st th { text-align: left; padding: 0.375rem 0.75rem; font-size: 0.75rem; color: var(--slate-500); border-bottom: 1px solid var(--slate-800); }
    .st td { padding: 0.375rem 0.75rem; font-size: 0.8125rem; border-bottom: 1px solid var(--slate-800); }
    .tl { font-size: 0.8125rem; color: var(--slate-500); margin-bottom: 2rem; }
    @media (max-width: 700px) { body { flex-direction: column; } .help-nav { width: 100%; height: auto; position: static; display: flex; flex-wrap: wrap; padding: 0.75rem; gap: 0.25rem; border-right: none; border-bottom: 1px solid var(--slate-800); } .help-nav-title { width: 100%; } .help-nav-item { border-left: none; padding: 0.375rem 0.75rem; font-size: 0.75rem; } .help-content { padding: 1.5rem; } .fg { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="help-nav" id="nav">
    <div class="help-nav-title">Snaproo Help</div>
  </nav>
  <main class="help-content" id="content"></main>
  <script src="help.js"></script>
  <script src="../shared/theme.js"></script>
</body>
</html>
